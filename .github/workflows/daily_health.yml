name: 🤖 Daily Strategy Health Check

on:
  schedule:
    # Every day at 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install yfinance pandas

      - name: Run health check
        run: python3 agent_maintainer/agent.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit improvements (if any)
        run: |
          git config --global user.name "HFT Maintenance Agent"
          git config --global user.email "agent@hft-bot.ai"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 [agent] auto-tune $(date +%Y-%m-%d)" && git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload health report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: health-report-${{ github.run_id }}
          path: data/health_report.json
